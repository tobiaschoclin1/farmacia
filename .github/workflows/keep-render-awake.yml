name: Keep Render Awake

on:
  schedule:
    # Corre cada 10 minutos (Render free tier duerme después de 15 min de inactividad)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          echo "🔔 Pinging Render service at $(date)"

          # Hacer request al dashboard para mantener despierto
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://farmacia-2xm1.onrender.com/api/dashboard/kpis)

          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Service is awake (HTTP $RESPONSE)"
          else
            echo "⚠️  Service responded with HTTP $RESPONSE"
          fi

          echo "Completed at $(date)"
