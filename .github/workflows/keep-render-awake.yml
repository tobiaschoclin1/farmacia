name: Keep Render Awake

on:
  schedule:
    - cron: '*/14 * * * *'  # Every 14 minutes (Render free tier sleeps after 15 min)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging Render service to prevent sleep..."
          curl --fail --silent --show-error --max-time 30 \
            "https://farmacia-2xm1.onrender.com/health" || echo "Ping failed but continuing..."
          echo "Ping completed at $(date)"
