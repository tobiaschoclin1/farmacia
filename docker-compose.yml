version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacia-postgres
    environment:
      POSTGRES_DB: farmacia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  farmacia-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmacia-web
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/farmacia
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/dashboard/kpis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
