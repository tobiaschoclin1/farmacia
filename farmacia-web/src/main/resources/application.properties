# Server configuration
server.port=${PORT:8080}
spring.application.name=farmacia-web

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.root=INFO
logging.level.com.tobias=DEBUG
logging.level.com.zaxxer.hikari=INFO

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires

# Database - PostgreSQL (production)
# Variables de entorno para Render/Fly/Koyeb
# NOTA: DataSourceConfig.java normaliza la URL agregando jdbc: si falta
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/farmacia}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway configuration for PostgreSQL
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgresql
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Deshabilitar JPA/Hibernate (no lo usamos, solo JDBC)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
