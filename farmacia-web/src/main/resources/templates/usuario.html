<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <title>Mi Perfil - Farmacia</title>
    <link rel="stylesheet" href="/css/theme-sidebar.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-logo">
                    <img src="/img/logo.png" alt="Farmacia" style="width: 40px; height: 40px; border-radius: 10px; object-fit: cover;">
                    <span class="sidebar-logo-text">Farmacia</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Principal</div>
                    <a href="/" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Gestión</div>
                    <a href="/productos" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <span>Productos</span>
                    </a>
                    <a href="/stock" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M3 3h18v18H3z M3 9h18 M9 21V9"></path>
                        </svg>
                        <span>Stock</span>
                    </a>
                    <a href="/vencimientos" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span>Vencimientos</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Movimientos</div>
                    <a href="/entradas" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                        <span>Entradas</span>
                    </a>
                    <a href="/salidas" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                        <span>Salidas</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Sistema</div>
                    <a href="/configuracion" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Configuración</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a href="/usuario" class="sidebar-profile">
                    <div class="sidebar-avatar">TC</div>
                    <div class="sidebar-profile-info">
                        <div class="sidebar-profile-name">Tobias Choclin</div>
                        <div class="sidebar-profile-role">Administrador</div>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-wrapper">
            <div class="main-content">
                <div class="page-header">
                    <h1 class="page-title">Mi Perfil</h1>
                    <p class="page-subtitle">Gestiona tu información personal y preferencias</p>
                </div>

                <!-- Cabecera del perfil -->
                <div class="profile-header">
                    <div class="profile-avatar-large">TC</div>
                    <div class="profile-info">
                        <h2>Tobias Choclin</h2>
                        <p>Administrador del Sistema</p>
                    </div>
                </div>

                <!-- Formulario de información personal -->
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-header">
                        <h3 class="card-title">Información Personal</h3>
                    </div>

                    <form id="profileForm" onsubmit="saveProfile(event)">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                            <div class="form-group">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-input" id="nombre" value="Tobias Choclin" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-input" id="email" value="tobias@farmacia.com" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Teléfono</label>
                                <input type="text" class="form-input" id="telefono" value="+54 9 11 1234-5678">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Rol</label>
                                <input type="text" class="form-input" id="rol" value="Administrador" disabled>
                            </div>
                        </div>

                        <div style="margin-top: 24px; display: flex; gap: 12px;">
                            <button type="submit" class="button">Guardar Cambios</button>
                            <button type="button" class="button ghost" onclick="resetForm()">Cancelar</button>
                        </div>
                    </form>
                </div>

                <!-- Cambiar contraseña -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Cambiar Contraseña</h3>
                    </div>

                    <form id="passwordForm" onsubmit="changePassword(event)">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                            <div class="form-group">
                                <label class="form-label">Contraseña Actual</label>
                                <input type="password" class="form-input" id="currentPassword" required>
                            </div>

                            <div></div>

                            <div class="form-group">
                                <label class="form-label">Nueva Contraseña</label>
                                <input type="password" class="form-input" id="newPassword" required minlength="8">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Confirmar Nueva Contraseña</label>
                                <input type="password" class="form-input" id="confirmPassword" required minlength="8">
                            </div>
                        </div>

                        <div style="margin-top: 24px;">
                            <button type="submit" class="button warning">Cambiar Contraseña</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        function saveProfile(event) {
            event.preventDefault();

            const formData = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value
            };

            console.log('Guardando perfil:', formData);
            alert('Perfil actualizado correctamente');
        }

        function changePassword(event) {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('Las contraseñas no coinciden');
                return;
            }

            console.log('Cambiando contraseña');
            alert('Contraseña cambiada correctamente');
            document.getElementById('passwordForm').reset();
        }

        function resetForm() {
            document.getElementById('profileForm').reset();
        }
    </script>
    <script src="/js/session.js"></script>
</body>
</html>
