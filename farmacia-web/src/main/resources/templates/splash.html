<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia - Sistema de Gestión</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F5F1E8 0%, #E8E3D5 100%);
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-wrapper {
            width: 160px;
            height: 160px;
            margin: 0 auto 40px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #2C2416;
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .subtitle {
            font-size: 18px;
            color: #6B6250;
            margin-bottom: 48px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            animation: fadeIn 0.8s ease-out 0.7s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #4A7BA7;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .skip-link {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #6B6250;
            text-decoration: none;
            font-size: 14px;
            padding: 12px 24px;
            border-radius: 20px;
            transition: all 0.3s;
            animation: fadeIn 1s ease-out 1.5s both;
        }

        .skip-link:hover {
            background-color: rgba(255,255,255,0.5);
            color: #2C2416;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="/img/logo.png" alt="Farmacia">
        </div>
        <h1>Farmacia</h1>
        <p class="subtitle">Sistema de Gestión</p>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <a href="/registro" class="skip-link">Saltar →</a>

    <script>
        // Verificar si ya hay sesión activa
        const user = sessionStorage.getItem('user');

        if (user) {
            // Si ya hay sesión, ir al dashboard
            window.location.href = '/dashboard';
        } else {
            // Si no hay sesión, ir al registro después de 2.5 segundos
            setTimeout(() => {
                window.location.href = '/registro';
            }, 2500);
        }
    </script>
</body>
</html>
