<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Dashboard - Farmacia</title>
    <link rel="stylesheet" href="/css/theme-sidebar.css">
    <style>
        #loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-logo">
                    <img src="/img/logo.jpg" alt="Farmacia" style="width: 40px; height: 40px; border-radius: 10px; object-fit: cover;">
                    <span class="sidebar-logo-text">Farmacia</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Principal</div>
                    <a href="/" class="nav-item active">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Gestión</div>
                    <a href="/productos" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <span>Productos</span>
                    </a>
                    <a href="/stock" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M3 3h18v18H3z M3 9h18 M9 21V9"></path>
                        </svg>
                        <span>Stock</span>
                    </a>
                    <a href="/vencimientos" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span>Vencimientos</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Movimientos</div>
                    <a href="/entradas" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                        <span>Entradas</span>
                    </a>
                    <a href="/salidas" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                        <span>Salidas</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Sistema</div>
                    <a href="/configuracion" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Configuración</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a href="/usuario" class="sidebar-profile">
                    <div class="sidebar-avatar">TC</div>
                    <div class="sidebar-profile-info">
                        <div class="sidebar-profile-name">Tobias Choclin</div>
                        <div class="sidebar-profile-role">Administrador</div>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-wrapper">
            <div class="main-content">
                <div class="page-header">
                    <div class="page-header-top">
                        <div>
                            <h1 class="page-title">Dashboard</h1>
                            <p class="page-subtitle">Vista general del estado del inventario y alertas</p>
                        </div>
                    </div>
                </div>

                <div id="loading">Cargando...</div>
                <div id="dashboard-content" style="display: none;">
                    <!-- KPIs Grid -->
                    <div class="metrics-grid" id="kpis-grid"></div>

                    <!-- Alertas Grid -->
                    <div class="alerts-grid">
                        <!-- Próximos a vencer -->
                        <div class="card">
                            <div class="card-title">
                                <svg width="20" height="20" fill="none" stroke="#E89B4F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="10" cy="10" r="8"></circle>
                                    <polyline points="10 6 10 10 13 13"></polyline>
                                </svg>
                                Productos Próximos a Vencer
                            </div>
                            <div id="proximos-vencer" style="margin-top: 16px;"></div>
                        </div>

                        <!-- Stock bajo -->
                        <div class="card">
                            <div class="card-title">
                                <svg width="20" height="20" fill="none" stroke="#D97066" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                    <line x1="12" y1="9" x2="12" y2="13"></line>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                                Productos con Stock Bajo
                            </div>
                            <div id="stock-bajo" style="margin-top: 16px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Iconos SVG
        const icons = {
            cube: (size, color) => `
                <svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            `,
            checkCircle: (size, color) => `
                <svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            `,
            alertTriangle: (size, color) => `
                <svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            `,
            xCircle: (size, color) => `
                <svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            `,
            clock: (size, color) => `
                <svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            `
        };

        // Función para convertir hex a rgba
        function hexToRgba(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${opacity})`;
        }

        // Cargar KPIs
        async function loadKPIs() {
            try {
                const response = await fetch('/api/dashboard/kpis');
                const data = await response.json();

                const kpis = [
                    { title: 'Productos Totales', value: data.totalProductos, desc: 'Total de productos activos', color: '#4A7BA7', icon: icons.cube(24, '#4A7BA7'), link: '/productos' },
                    { title: 'En Stock', value: data.enStock, desc: 'Con stock suficiente', color: '#5F9B8D', icon: icons.checkCircle(24, '#5F9B8D'), link: '/stock?estado=EN_STOCK' },
                    { title: 'Stock Bajo', value: data.stockBajo, desc: 'Por debajo del mínimo', color: '#E89B4F', icon: icons.alertTriangle(24, '#E89B4F'), link: '/stock?estado=STOCK_BAJO' },
                    { title: 'Sin Stock', value: data.sinStock, desc: 'Requieren reposición', color: '#D97066', icon: icons.xCircle(24, '#D97066'), link: '/stock?estado=SIN_STOCK' },
                    { title: 'Próx. a Vencer', value: data.proxVencer, desc: 'Vencen en 30 días', color: '#E89B4F', icon: icons.clock(24, '#E89B4F'), link: '/vencimientos?dias=30&estado=VENCE_PRONTO' }
                ];

                const grid = document.getElementById('kpis-grid');
                grid.innerHTML = kpis.map(kpi => `
                    <div class="metric-card" onclick="window.location.href='${kpi.link}'" style="cursor: pointer;">
                        <div class="metric-icon" style="background-color: ${hexToRgba(kpi.color, 0.1)};">
                            ${kpi.icon}
                        </div>
                        <div class="metric-label">${kpi.title}</div>
                        <div class="metric-value" style="color: ${kpi.color};">${kpi.value}</div>
                        <div class="metric-change">${kpi.desc}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error cargando KPIs:', error);
            }
        }

        // Cargar próximos a vencer
        async function loadProximosVencer() {
            try {
                const response = await fetch('/api/dashboard/proximos-vencer');
                const data = await response.json();

                const container = document.getElementById('proximos-vencer');

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            ${icons.checkCircle(16, '#5F9B8D')}
                            No hay productos próximos a vencer
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="alert-item warning">
                        <div class="alert-icon">${icons.clock(18, '#E89B4F')}</div>
                        <div class="alert-info">
                            <div class="nombre">${item.nombre}</div>
                            <div class="detalle">${item.fechaFormateada} • ${item.diasRestantes} días • ${item.cantidad} unidades</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error cargando próximos a vencer:', error);
            }
        }

        // Cargar stock bajo
        async function loadStockBajo() {
            try {
                const response = await fetch('/api/dashboard/stock-bajo');
                const data = await response.json();

                const container = document.getElementById('stock-bajo');

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            ${icons.checkCircle(16, '#5F9B8D')}
                            Todos los productos tienen stock suficiente
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="alert-item danger">
                        <div class="alert-icon">${icons.alertTriangle(18, '#D97066')}</div>
                        <div class="alert-info">
                            <div class="nombre">${item.nombre}</div>
                            <div class="detalle">Stock: ${item.cantidadActual} / ${item.stockMinimo} • ${item.porcentaje}% del mínimo</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error cargando stock bajo:', error);
            }
        }

        // Cargar dashboard
        async function loadDashboard() {
            await Promise.all([
                loadKPIs(),
                loadProximosVencer(),
                loadStockBajo()
            ]);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';
        }

        // Cargar al inicio
        loadDashboard();

        // Recargar cada 30 segundos
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
