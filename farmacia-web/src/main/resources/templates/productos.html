<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Farmacia</title>
    <link rel="stylesheet" href="/css/theme-sidebar.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-logo">
                    <div class="sidebar-logo-icon">+</div>
                    <span class="sidebar-logo-text">Farmacia</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Principal</div>
                    <a href="/" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Gestión</div>
                    <a href="/productos" class="nav-item active">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <span>Productos</span>
                    </a>
                    <a href="/stock" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M3 3h18v18H3z M3 9h18 M9 21V9"></path>
                        </svg>
                        <span>Stock</span>
                    </a>
                    <a href="/vencimientos" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span>Vencimientos</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Movimientos</div>
                    <a href="/entradas" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                        <span>Entradas</span>
                    </a>
                    <a href="/salidas" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                        <span>Salidas</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Sistema</div>
                    <a href="/configuracion" class="nav-item">
                        <svg class="nav-item-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Configuración</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a href="/usuario" class="sidebar-profile">
                    <div class="sidebar-avatar">TC</div>
                    <div class="sidebar-profile-info">
                        <div class="sidebar-profile-name">Tobias Choclin</div>
                        <div class="sidebar-profile-role">Administrador</div>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-wrapper">
            <div class="main-content">
                <div class="page-header">
                    <h1 class="page-title">Productos</h1>
                    <p class="page-subtitle">Gestión del catálogo de productos farmacéuticos</p>
                </div>

            <div class="card">
                <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <input type="text" id="search" placeholder="Buscar por nombre o código de barras..." style="flex: 1;">
                    <button onclick="loadProductos()">Buscar</button>
                </div>

                <div id="loading">Cargando productos...</div>
                <div id="productos-table" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Unidad Base</th>
                                <th>Unidades/Caja</th>
                                <th>Stock Mínimo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="productos-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadProductos() {
            const search = document.getElementById('search').value;
            const url = search ? `/api/productos?filtro=${encodeURIComponent(search)}` : '/api/productos';

            try {
                const response = await fetch(url);
                const productos = await response.json();

                const tbody = document.getElementById('productos-body');
                tbody.innerHTML = productos.map(p => `
                    <tr>
                        <td>${p.codigoBarra || '-'}</td>
                        <td><strong>${p.nombre}</strong></td>
                        <td>${p.unidadBase}</td>
                        <td>${p.unidadesPorCaja || '-'}</td>
                        <td>${p.stockMinimo}</td>
                        <td>
                            ${p.activo
                                ? '<span class="badge success">Activo</span>'
                                : '<span class="badge neutral">Inactivo</span>'}
                        </td>
                    </tr>
                `).join('');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('productos-table').style.display = 'block';
            } catch (error) {
                console.error('Error cargando productos:', error);
                document.getElementById('loading').textContent = 'Error al cargar productos';
            }
        }

        // Cargar al inicio
        loadProductos();

        // Buscar al presionar Enter
        document.getElementById('search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadProductos();
        });
    </script>
</body>
</html>
