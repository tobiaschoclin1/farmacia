<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Farmacia</title>
    <link rel="stylesheet" href="/css/theme-professional.css">
</head>
<body>
    <div class="app-container">
        <div class="main-content" style="padding-bottom: 0;">
            <div style="margin-bottom: 24px;">
                <h1 style="font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px;">
                    Sistema de Gestión Farmacéutica
                </h1>
                <p style="color: var(--text-secondary); font-size: 14px;">
                    Control integral de inventario y vencimientos
                </p>
            </div>

            <div class="tabs">
                <a href="/" class="tab">Dashboard</a>
                <a href="/productos" class="tab active">Productos</a>
                <a href="/entradas" class="tab">Entradas</a>
                <a href="/salidas" class="tab">Salidas</a>
                <a href="/stock" class="tab">Stock</a>
                <a href="/vencimientos" class="tab">Vencimientos</a>
            </div>
        </div>

        <div class="main-content" style="padding-top: 0;">
            <div class="page-header">
                <h1 class="page-title">Productos</h1>
                <p class="page-subtitle">Gestión del catálogo de productos farmacéuticos</p>
            </div>

            <div class="card">
                <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <input type="text" id="search" placeholder="Buscar por nombre o código de barras..." style="flex: 1;">
                    <button onclick="loadProductos()">Buscar</button>
                </div>

                <div id="loading">Cargando productos...</div>
                <div id="productos-table" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Unidad Base</th>
                                <th>Unidades/Caja</th>
                                <th>Stock Mínimo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="productos-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadProductos() {
            const search = document.getElementById('search').value;
            const url = search ? `/api/productos?filtro=${encodeURIComponent(search)}` : '/api/productos';

            try {
                const response = await fetch(url);
                const productos = await response.json();

                const tbody = document.getElementById('productos-body');
                tbody.innerHTML = productos.map(p => `
                    <tr>
                        <td>${p.codigoBarra || '-'}</td>
                        <td><strong>${p.nombre}</strong></td>
                        <td>${p.unidadBase}</td>
                        <td>${p.unidadesPorCaja || '-'}</td>
                        <td>${p.stockMinimo}</td>
                        <td>
                            ${p.activo
                                ? '<span class="badge success">Activo</span>'
                                : '<span class="badge neutral">Inactivo</span>'}
                        </td>
                    </tr>
                `).join('');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('productos-table').style.display = 'block';
            } catch (error) {
                console.error('Error cargando productos:', error);
                document.getElementById('loading').textContent = 'Error al cargar productos';
            }
        }

        // Cargar al inicio
        loadProductos();

        // Buscar al presionar Enter
        document.getElementById('search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadProductos();
        });
    </script>
</body>
</html>
